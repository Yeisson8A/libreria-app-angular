<div class="header">
  <h2>Libros</h2>

  <button mat-raised-button color="primary" (click)="irCrear()">
    <mat-icon>add</mat-icon>
    Nuevo Libro
  </button>
</div>
<br/>
<app-card-grid
  [items]="libros"
  titleKey="titulo"
  subtitleKey="autor"
  extraKey="isbn"
  (edit)="editar($event)"
  (delete)="eliminar($event)">
</app-card-grid>
