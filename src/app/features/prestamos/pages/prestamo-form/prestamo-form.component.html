<div class="container">
  <mat-card>
    <mat-card-title> Nuevo Préstamo </mat-card-title>
    <br />
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="guardar()">
        <div class="row">
          <mat-form-field>
            <mat-label>Libro</mat-label>
            <mat-select formControlName="libroId">
              <mat-option *ngFor="let libro of libros" [value]="libro.id">
                {{ libro.titulo }}
              </mat-option>
            </mat-select>
            <mat-error *ngIf="form.get('libroId')?.hasError('required')">
              El libro es obligatorio
            </mat-error>
            <mat-error *ngIf="form.get('libroId')?.hasError('backend')">
              {{ form.get("libroId")?.getError("backend") }}
            </mat-error>
          </mat-form-field>

          <mat-form-field>
            <mat-label>Usuario</mat-label>
            <mat-select formControlName="usuarioId">
              <mat-option *ngFor="let usuario of usuarios" [value]="usuario.id">
                {{ usuario.nombre }}
              </mat-option>
            </mat-select>
            <mat-error *ngIf="form.get('usuarioId')?.hasError('required')">
              El usuario es obligatorio
            </mat-error>
            <mat-error *ngIf="form.get('usuarioId')?.hasError('backend')">
              {{ form.get("usuarioId")?.getError("backend") }}
            </mat-error>
          </mat-form-field>
        </div>
        <div class="actions">
          <button
            mat-raised-button
            color="primary"
            type="button"
            (click)="volver()"
          >
            Volver
          </button>

          <button
            mat-flat-button
            color="primary"
            type="submit"
            [disabled]="form.invalid"
          >
            Prestar
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
