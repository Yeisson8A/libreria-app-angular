<div class="header">
  <h2>Préstamos</h2>

  <button mat-raised-button color="primary" (click)="irCrear()">
    <mat-icon>add</mat-icon>
    Nuevo Préstamo
  </button>
</div>
<br/>
<app-card-grid
  [items]="prestamos"
  titleKey="tituloLibro"
  subtitleKey="nombreUsuario"
  [showEdit]="false"
  [showDelete]="false"
  [customActions]="accionesPrestamo">
</app-card-grid>
