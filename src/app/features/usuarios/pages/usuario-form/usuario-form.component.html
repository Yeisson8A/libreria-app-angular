<div class="container">
  <mat-card>
    <mat-card-title> Nuevo Usuario </mat-card-title>
    <br />
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="guardar()" class="form">
        <div class="row">
          <mat-form-field>
            <mat-label>Nombre</mat-label>
            <input matInput formControlName="nombre" />
            <mat-error *ngIf="form.get('nombre')?.hasError('required')">
              El nombre es obligatorio
            </mat-error>
            <mat-error *ngIf="form.get('nombre')?.hasError('backend')">
              {{ form.get("nombre")?.getError("backend") }}
            </mat-error>
          </mat-form-field>

          <mat-form-field>
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" />
            <mat-error *ngIf="form.get('email')?.hasError('required')">
              El email es obligatorio
            </mat-error>
            <mat-error *ngIf="form.get('email')?.hasError('email')">
              El email no es válido
            </mat-error>
            <mat-error *ngIf="form.get('email')?.hasError('backend')">
              {{ form.get("email")?.getError("backend") }}
            </mat-error>
          </mat-form-field>
        </div>
        <div class="actions">
          <button
            mat-raised-button
            color="primary"
            type="button"
            (click)="volver()"
          >
            Volver
          </button>

          <button
            mat-flat-button
            color="primary"
            type="submit"
            [disabled]="form.invalid"
          >
            Guardar
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
