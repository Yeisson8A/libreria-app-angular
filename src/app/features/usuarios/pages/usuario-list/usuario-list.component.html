<div class="header">
  <h2>Usuarios</h2>

  <button mat-raised-button color="primary" (click)="irCrear()">
    <mat-icon>add</mat-icon>
    Nuevo Usuario
  </button>
</div>
<br/>
<app-card-grid
  [items]="usuarios"
  titleKey="nombre"
  subtitleKey="email"
  [showEdit]="false"
  [showDelete]="false">
</app-card-grid>
